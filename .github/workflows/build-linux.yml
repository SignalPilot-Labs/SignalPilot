name: Build (Linux / Docker)

# The real deployable artifact: builds all Docker images via docker compose.
# Ubuntu runners run Linux Docker natively (unlike the Windows/macOS runners),
# so this is where the actual image build is validated end-to-end.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
