# SignalPilot — default configuration
# Override per-user: ~/.signalpilot/config.yml
# Override per-project: .signalpilot/config.yml
# Override via env: SP_DATABASE_PORT=5600, SP_GATEWAY_PORT=3300, etc.

database:
  host: localhost
  port: 5600
  user: postgres
  password: postgres
  name: signalpilot

gateway:
  host: 0.0.0.0
  port: 3300

web:
  port: 3200

sandbox:
  provider: auto
  max_vms: 4
  vm_memory_mb: 512
  vm_vcpus: 1

agent:
  port: 8500
  max_budget_usd: 0

monitor:
  port: 3400
  api_port: 3401
