version: 2

models:
  - name: fct_revenue_daily
    description: >
      Daily transfer revenue rolled up by corridor and currency pair. Volume from
      all transfers; realized revenue from completed transfers.
    columns:
      - name: revenue_date
        description: Calendar date of the transfer's created_at.
        data_tests: [not_null]
      - name: corridor_id
        description: Corridor (FK to dim_corridors).
      - name: total_revenue
        description: Modelled total revenue (fees + fx margin) for the grain.
        data_tests: [not_null]
      - name: transfer_count
        description: Transfers in the grain.
        data_tests: [not_null]

  - name: fct_fx_pnl_daily
    description: >
      Daily FX profit-and-loss by currency pair, with realized margin in bps.
      One row per (pnl_date, base_currency, quote_currency).
    columns:
      - name: pnl_id
        description: Source pnl row id (primary key).
        data_tests: [unique, not_null]
      - name: pnl_date
        description: P&L date.
        data_tests: [not_null]
      - name: pair
        description: base/quote currency pair label.
        data_tests: [not_null]
      - name: total_pnl_usd
        description: Realized + unrealized P&L in USD.

  - name: fct_ledger_balances
    description: >
      Per-account end-of-day running balance from the double-entry journal lines.
      One row per (account_id, balance_date) on days the account had activity.
    columns:
      - name: account_id
        description: Ledger account id (FK to ledger accounts).
        data_tests: [not_null]
      - name: balance_date
        description: Activity date.
        data_tests: [not_null]
      - name: running_balance
        description: Cumulative signed balance for the account through balance_date.
        data_tests: [not_null]
      - name: customer_code
        description: Owning customer code for customer wallet accounts (null for house accounts).
