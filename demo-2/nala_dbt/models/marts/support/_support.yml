version: 2

models:
  - name: fct_support_tickets
    description: >
      Unified support contact fact. One row per support contact across Zendesk
      tickets and Intercom conversations, brought to a common grain. CSAT is
      attached from the Zendesk satisfaction ratings or the Intercom rating.
    columns:
      - name: support_contact_key
        description: Surrogate key (source_system:contact_id). Primary key.
        tests:
          - unique
          - not_null
      - name: contact_id
        description: Source contact id (Zendesk ticket id or Intercom conversation id).
        tests:
          - not_null
      - name: source_system
        description: Originating system (zendesk / intercom).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['zendesk', 'intercom']
      - name: customer_email
        description: Requester / contact email (PII, normalized).
      - name: status
        description: Contact status in the source system.
      - name: is_resolved
        description: Whether the contact is resolved / closed.
      - name: csat_score
        description: Customer satisfaction rating (good / bad).
      - name: created_at
        description: When the contact was created.
