version: 2

sources:
  - name: raw_amplitude
    schema: raw_amplitude
    description: >
      Amplitude product-analytics export. NALA dual-instruments through Segment
      and Amplitude so events overlap raw_segment. Timestamps are stored as
      EPOCH MILLISECONDS (bigint) — a vendor format-drift trap.
    tables:
      - name: events
        description: "FACT event stream. event_time/client_event_time/server_upload_time are EPOCH MS (bigint). device_id equals raw_segment.tracks.anonymous_id."
        loaded_at_field: "to_timestamp(server_upload_time / 1000)"
        columns:
          - name: uuid
            description: "Amplitude event uuid. Primary key."
          - name: amplitude_id
            description: "Amplitude internal user id (bigint surrogate)."
          - name: user_id
            description: "Customer code CUS_... — NULL for anonymous. PII link."
          - name: device_id
            description: "Device id. PII. Equals raw_segment anonymous_id."
          - name: event_type
            description: "Event name, e.g. 'Transfer Completed', 'Session Start'."
          - name: event_time
            description: "Event time as EPOCH MILLISECONDS (bigint). Divide by 1000 to get epoch seconds."
          - name: idfa
            description: "iOS advertising id. PII. NULL when ATT-denied (~40%)."
          - name: adid
            description: "Android advertising id / GAID. PII."
          - name: ip_address
            description: "Client IP (inet). PII."
      - name: user_properties
        description: "Latest property snapshot per amplitude_id (denormalized profile). One row per amplitude_id."
        columns:
          - name: amplitude_id
            description: "Amplitude internal user id. Primary key."
          - name: user_id
            description: "Customer code CUS_... (nullable for anon-only users)."
          - name: properties
            description: "jsonb profile blob (plan, country, kyc_status, lifetime_transfers, ...)."
      - name: cohorts
        description: "Behavioral cohorts defined in the Amplitude UI (lookup-ish)."
