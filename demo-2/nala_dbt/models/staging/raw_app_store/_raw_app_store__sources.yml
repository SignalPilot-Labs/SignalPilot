version: 2

sources:
  - name: raw_app_store
    schema: raw_app_store
    description: >
      Apple App Store Connect + Google Play Console exports. Downloads/installs
      are anonymous daily aggregates (no user id); reviews carry reviewer text
      and nickname (PII-ish) plus a 1..5 star rating (NALA averages ~4.8).
    tables:
      - name: apple_downloads
        description: "Daily aggregated App Store download/units metrics. Grain: (report_date, country, app_version, source_type, device)."
        loaded_at_field: loaded_at
      - name: apple_reviews
        description: "One row per App Store review (rating, free-text body, reviewer nickname)."
        columns:
          - name: review_id
            description: "App Store Connect review id. Primary key."
          - name: rating
            description: "1..5 star rating."
          - name: body
            description: "Review free-text. May contain PII."
          - name: reviewer_nickname
            description: "Display nickname. PII-ish."
      - name: google_play_installs
        description: "Daily aggregated Play Console install metrics. Grain: (stat_date, country, app_version_code). Note Google column naming."
        loaded_at_field: loaded_at
      - name: google_play_reviews
        description: "One row per Play Store review (star_rating, free-text, author name)."
        columns:
          - name: review_id
            description: "Play review id. Primary key."
          - name: star_rating
            description: "1..5 star rating."
          - name: review_text
            description: "Review free-text. May contain PII."
          - name: author_name
            description: "Reviewer display name. PII-ish."
