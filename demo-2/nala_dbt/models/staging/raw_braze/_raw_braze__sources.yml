version: 2

sources:
  - name: raw_braze
    description: >
      Braze customer-engagement / messaging platform (campaigns, canvases,
      segments, message-send event stream and custom events). Joins to NALA
      customers via external_user_id (customer code 'CUS_XXXXXXXX').
    schema: raw_braze
    tables:
      - name: campaigns
        description: Single-step messaging campaigns. status has legacy value STOPPED.
        columns:
          - name: campaign_id
            description: 24-hex Braze api_id (primary key).
          - name: channel
            description: email / push / in_app_message / sms / webhook.
          - name: first_sent
            description: ISO-Z string, nullable (text, not timestamp).
          - name: last_sent
            description: ISO-Z string, nullable.
          - name: created_at
            description: tz-aware creation timestamp.
      - name: canvases
        description: Multi-step orchestration journeys (Braze Canvas).
        columns:
          - name: canvas_id
            description: 24-hex api_id (primary key).
      - name: segments
        description: Audience definitions; estimated_size is a snapshot count.
        columns:
          - name: segment_id
            description: 24-hex api_id (primary key).
      - name: messages_sent
        description: >
          Currents-style send event stream (one row per message event). The
          core engagement fact. event_type is a funnel (sent/delivered/open/...).
        loaded_at_field: to_timestamp("time")
        columns:
          - name: id
            description: Surrogate primary key.
          - name: external_user_id
            description: NALA customer code 'CUS_XXXXXXXX' (cross-source join key).
          - name: email
            description: PII. Recipient email, dirty (casing/space drift), ~5% null; null for non-email channels.
          - name: event_type
            description: sent / delivered / open / click / bounce / unsubscribe.
          - name: sent_at
            description: ISO-Z string send time.
          - name: time
            description: Epoch seconds duplicate of sent_at.
      - name: custom_events
        description: Tracked product/business events forwarded to Braze.
        columns:
          - name: external_user_id
            description: NALA customer code.
          - name: time
            description: Epoch MILLISECONDS (drift vs messages_sent epoch seconds).
          - name: received_at
            description: ISO string, no timezone (legacy).
