version: 2

sources:
  - name: raw_chainalysis
    schema: raw_chainalysis
    description: >
      Chainalysis crypto wallet risk screening (KYT). Deposit/withdrawal wallet
      addresses are screened for exposure to sanctioned, darknet, scam and other
      risk categories. High/Severe screenings raise alerts; exposure breaks down
      counterparty categories by direction.
    tables:
      - name: address_screenings
        description: One row per address screening request. address is a crypto wallet (PII).
        loaded_at_field: "requested_at::timestamptz"
        columns:
          - name: id
            description: Screening id ("scr_<uuid>").
          - name: address
            description: Crypto wallet address (pseudonymous PII).
          - name: nala_customer_code
            description: NALA customer code; ~55% null (counterparty wallets).
          - name: risk
            description: Low / Medium / High / Severe.
          - name: is_sanctioned
            description: Whether the attributed cluster is sanctioned.
      - name: screening_alerts
        description: Alerts raised off High/Severe screenings.
        columns:
          - name: id
            description: Alert id ("alrt_<uuid>").
          - name: screening_id
            description: FK to address_screenings.id.
          - name: triggered_at_epoch_ms
            description: Trigger time as epoch MILLISECONDS (created_at is ISO string).
      - name: exposure
        description: Per-category exposure breakdown lines for a screening.
        columns:
          - name: id
            description: Surrogate PK.
          - name: screening_id
            description: FK to address_screenings.id.
          - name: value_usd
            description: USD value exposed to the category.
