version: 2

sources:
  - name: raw_core_transfers
    description: >
      Domain 1 — NALA internal core (consumer remittance monolith + transfers
      service). Sender accounts, recipients/beneficiaries, and the central
      `transfers` fact plus its supporting legs, status history, fees, quotes,
      payout attempts, promos and referrals. The heart of the product; other
      source domains reference `transfers.transfer_id` (a deterministic UUID).
    schema: raw_core_transfers
    tables:
      - name: customers
        description: Sender (consumer) accounts. PII-heavy. `customer_id` is the canonical cross-source customer id.
        loaded_at_field: updated_at
        columns:
          - name: customer_id
            description: Canonical customer id (joins across every source domain).
          - name: email
            description: PII. Dirty — casing/space drift, ~4% null.
          - name: phone
            description: PII. Format drift (E.164 / 00-prefix / spaced).
          - name: national_id
            description: PII. ~10% null. `national_id_hash` mimics partial governance.
          - name: account_status
            description: Free-text status (active/suspended/closed).
          - name: raw_attributes
            description: jsonb denormalized snapshot blob.
      - name: customer_addresses
        description: Customer postal addresses (PII). `created` is a legacy ISO string, not tz.
      - name: customer_devices
        description: Known devices per customer. `last_seen_at` is ISO-Z text; `first_seen_epoch_ms` is epoch ms. PII — ip_address, push_token.
      - name: customer_kyc_status
        description: KYC decision per customer (Onfido/Jumio/Persona). status has legacy value PENDING_OLD. `document_number` is PII.
      - name: recipients
        description: Beneficiaries owned by a sender (`customer_id`). PII — names/phone/email/dob. email ~55% null.
        columns:
          - name: recipient_id
            description: Recipient surrogate key. Referenced by transfers.recipient_id.
          - name: customer_id
            description: Owning sender (canonical customer id).
      - name: recipient_payout_methods
        description: Payout destinations (mobile money MSISDN / bank account / IBAN). PII-heavy.
      - name: saved_recipients
        description: >
          LEGACY near-duplicate of recipients. Messy: single free-text `name`,
          `country` sometimes full name, `payment_type` inconsistent casing
          (MPESA/mpesa/momo/BANK), `created`/`updated` epoch ms, `deleted` 0/1.
          `migrated_recipient_id` links to recipients (often null).
      - name: transfers
        description: >
          FACT — one row per money transfer. transfer_id is det_uuid(("transfer",i)).
          send+receive country/currency, amounts, fee, fx_rate/mid/margin, status,
          rail, payout/funding partner. status has legacy value PENDING_OLD.
        loaded_at_field: updated_at
        columns:
          - name: transfer_id
            description: UUID PK. Canonical transfer id reused by other source domains.
          - name: customer_id
            description: Sender (canonical customer id).
          - name: recipient_id
            description: Beneficiary.
          - name: corridor_id
            description: FK to corridors lookup.
          - name: status
            description: COMPLETED/PENDING/FAILED/CANCELLED/REFUNDED + legacy PENDING_OLD.
          - name: source_ip
            description: PII (inet).
      - name: transfer_legs
        description: Sub-steps of a transfer (funding / fx / payout).
      - name: transfer_status_history
        description: Status transition events. `changed_at` is ISO-Z text.
      - name: transfer_fees
        description: Fee breakdown per transfer (transfer / fx_margin / promo_discount). Discounts are negative.
      - name: quotes
        description: Price quotes. Most convert to a transfer (`converted`, `transfer_id`); ~10% are orphan/non-converting.
        loaded_at_field: created_at
      - name: fx_quotes
        description: FX detail behind a quote. `created`/`valid_until` are epoch ms.
      - name: payout_attempts
        description: Per-transfer payout rail attempts (retries on failure). `requested_at` is ISO-Z text. PII — msisdn/account_number.
      - name: promo_redemptions
        description: Promo code redemptions tied to a transfer.
      - name: referrals
        description: Referral relationships (referrer -> referee) and reward state.
      - name: referral_codes
        description: Shareable referral codes owned by a customer.
      - name: corridors
        description: Lookup — supported send-currency x receive-market combinations.
      - name: cancellation_reasons
        description: Lookup — reasons a transfer was cancelled (compliance/user/partner/system).
