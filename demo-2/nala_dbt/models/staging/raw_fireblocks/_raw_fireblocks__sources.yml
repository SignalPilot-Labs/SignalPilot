version: 2

sources:
  - name: raw_fireblocks
    schema: raw_fireblocks
    description: >
      Fireblocks crypto custody (stablecoin treasury). camelCase API columns,
      epoch-ms timestamps, decimal-string amounts. Loaded by
      warehouse/generators/gen_raw_fireblocks.py.
    tables:
      - name: supported_assets
        description: Catalog of assets enabled in the Fireblocks workspace.
        columns:
          - name: asset_id
            description: Primary key (e.g. USDC, USDC_POLYGON, USDT, PYUSD).
          - name: decimals
            description: Token decimals.

      - name: vault_accounts
        description: Logical custody containers (treasury + customer-segregated).
        columns:
          - name: id
            description: Primary key, Fireblocks vault id.
          - name: customerRefId
            description: CUS_... for segregated vaults (dirty PII join key, ~15% null).
          - name: address
            description: Deposit address (crypto, PII).
          - name: createdAt
            description: ISO-Z string (text), not a timestamp.

      - name: vault_transactions
        description: On-chain / internal custody movements of stablecoin treasury.
        columns:
          - name: id
            description: Primary key.
          - name: assetId
            description: FK to supported_assets.
          - name: amount
            description: Decimal STRING — cast to numeric.
          - name: createdAt
            description: epoch MILLISECONDS (bigint) — to_timestamp(createdAt/1000.0).
          - name: txHash
            description: On-chain hash (PII-ish), null until COMPLETED.
          - name: customerRefId
            description: CUS_... (dirty PII join key, ~60% null).
          - name: referenceId
            description: Internal settlement/transfer id.
