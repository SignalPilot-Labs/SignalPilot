version: 2

sources:
  - name: raw_fx
    description: >
      NALA's internal fx-engine: rate ingestion + blending, pricing-margin and
      corridor-pricing config, treasury P&L and hedge positions. Rates are
      anchored on indicative USD levels with daily/intraday drift. Mostly
      snake_case with a few legacy camelCase leftovers. No PII (FX market data).
    schema: raw_fx
    tables:
      - name: rate_providers
        description: Lookup of upstream rate sources the engine blends. One row per provider.
        loaded_at_field: created_at
        columns:
          - name: provider_id
            description: Primary key. Referenced by fx_rates / fx_rate_snapshots.
          - name: provider_code
            description: Short code (OPENEXCHANGE, REUTERS, INTERNAL_BLEND, ...).
          - name: is_active
            description: False for decommissioned feeds (e.g. BLOOMBERG).

      - name: fx_rates
        description: >
          FACT. Hourly mid/bid/ask time series per currency pair (capped to keep
          demo under ~5M rows). One row per (pair, tick).
        loaded_at_field: ingested_at
        columns:
          - name: rate_id
            description: Primary key, dense bigint counter.
          - name: base_currency
            description: Base of the pair (units of quote per 1 base).
          - name: quote_currency
            description: Quote of the pair.
          - name: pair
            description: Denormalized 'BASE/QUOTE' string.
          - name: mid_rate
            description: Mid rate (quote per base). bid <= mid <= ask.
          - name: ts_iso
            description: ISO-Z string of the tick instant.
          - name: ts_epoch_ms
            description: Legacy epoch-ms of the same instant.
          - name: ingested_at
            description: Clean tz-aware tick timestamp.
          - name: is_stale
            description: Engine flagged the tick as stale (~1.5%).

      - name: fx_rate_snapshots
        description: Cached USD-base rate board as a jsonb map, every ~6h. One row per snapshot.
        loaded_at_field: snapshot_at
        columns:
          - name: rates
            description: jsonb map of quote currency -> rate (quote per 1 USD).
          - name: source_label
            description: "Free-text origin; legacy values 'legacy_cron' / 'PRICING_CACHE_OLD'."

      - name: pricing_margins
        description: >
          FX margin (bps over mid) per send/receive currency and customer
          segment. Effective-dated + soft-deletable.
        loaded_at_field: updated_at
        columns:
          - name: margin_id
            description: Primary key.
          - name: customer_segment
            description: consumer / rafiki / vip.
          - name: effective_to
            description: NULL = currently active row.
          - name: is_deleted
            description: Soft-delete flag (~5%).

      - name: corridor_pricing
        description: Per-corridor quote config (fixed fee + fx margin + limits). One row per corridor/method.
        loaded_at_field: updated_at
        columns:
          - name: corridor_pricing_id
            description: Primary key.
          - name: payout_method
            description: M-PESA / Bank / MTN MoMo / etc.
          - name: send_country
            description: Denormalized, ~25% NULL.
          - name: isActive
            description: Legacy camelCase corridor-live flag (quote it).

      - name: fx_pnl
        description: Treasury realized/unrealized FX P&L per pair. Weekly marks. One row per (pair, date).
        loaded_at_field: created_at
        columns:
          - name: pnl_id
            description: Primary key.
          - name: unrealized_pnl_usd
            description: Mark-to-market; can be negative.

      - name: fx_hedges
        description: Treasury hedge positions (spot/forward/swap) with bank counterparties.
        loaded_at_field: created_at
        columns:
          - name: hedge_id
            description: Primary key, UUID.
          - name: status
            description: open / settled / cancelled.
          - name: mark_to_market_usd
            description: Current MtM in USD; can be negative.
