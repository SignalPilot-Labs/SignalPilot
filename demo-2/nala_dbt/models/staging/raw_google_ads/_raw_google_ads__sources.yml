version: 2

sources:
  - name: raw_google_ads
    description: >
      Google Ads API export (paid-search/display acquisition). Aggregate spend
      only — no customer PII. Money is in MICROS (1e6 = 1 currency unit).
    schema: raw_google_ads
    tables:
      - name: campaigns
        description: Google Ads campaigns. customer_id is the ACCOUNT id, not a NALA customer.
        columns:
          - name: campaign_id
            description: Resource id (primary key).
          - name: campaign_budget_micros
            description: Daily budget in micros.
      - name: ad_groups
        description: Ad groups within a campaign.
        columns:
          - name: ad_group_id
            description: Resource id (primary key).
          - name: campaign_id
            description: FK to campaigns.campaign_id.
      - name: ad_performance_daily
        description: >
          Daily aggregate performance per ad group per device. Primary spend/CAC
          table. cost_micros is in micros; ctr is legacy/stale.
        loaded_at_field: loaded_at
        columns:
          - name: id
            description: Surrogate primary key.
          - name: date
            description: Report date.
          - name: cost_micros
            description: Spend in micros (divide by 1e6 for currency units).
          - name: conversions
            description: Fractional attributed conversions.
          - name: currency_code
            description: Account currency (GBP/USD/EUR).
          - name: ctr
            description: Legacy precomputed CTR, ~10% null/stale — recompute from clicks/impressions.
