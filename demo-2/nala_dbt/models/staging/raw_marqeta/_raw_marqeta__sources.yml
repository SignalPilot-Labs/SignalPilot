version: 2

sources:
  - name: raw_marqeta
    schema: raw_marqeta
    description: >
      Marqeta card-issuing landing tables. NALA issues its own cards for the
      multi-currency wallet/spend product. uuid-ish tokens, ISO-8601 offset
      string timestamps, amounts in MAJOR units. PII: cardholder name/email,
      card last4, pan_token (never full PAN).
    tables:
      - name: cardholders
        description: One row per Marqeta user (a NALA cardholder). PII-heavy.
        columns:
          - name: token
            description: Marqeta user token.
          - name: nala_customer_code
            description: Cross-source key to canonical NALA customer (CUS_00000123).
          - name: status
            description: ACTIVE/SUSPENDED/UNVERIFIED/LIMITED.
      - name: cards
        description: Issued cards (virtual/physical). last4 + pan_token only, never full PAN.
        columns:
          - name: token
            description: Card token.
          - name: user_token
            description: Owning cardholder token.
          - name: last_four
            description: Card last 4 (PII).
          - name: pan_token
            description: Tokenized PAN reference (PII).
      - name: card_transactions
        description: Card auth/clearing/refund/reversal events (MAJOR units).
        loaded_at_field: user_transaction_time::timestamptz
        columns:
          - name: token
            description: Transaction token.
          - name: card_token
            description: Card token.
          - name: amount
            description: MAJOR units; refunds/reversals negative.
          - name: nala_transfer_id
            description: UUID of related transfer (dirty casing, sparse).
      - name: funding_sources
        description: Card funding sources (program GPA or per-cardholder wallet).
        columns:
          - name: token
            description: Funding source token.
          - name: user_token
            description: Cardholder token (null = program-level).
