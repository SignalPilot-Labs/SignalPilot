version: 2

sources:
  - name: raw_netsuite
    schema: raw_netsuite
    description: >
      Oracle NetSuite ERP / general ledger across NALA's legal subsidiaries
      (UK, US, Kenya, Tanzania, Senegal, Nigeria). Chart of accounts, GL
      transaction lines, AP vendors and bills. Quirks: integer internalIds,
      multi-currency with exchange_rate, epoch-ms drift, free-text statuses.
    tables:
      - name: subsidiaries
        description: Legal subsidiary / consolidation entities (NetSuite OneWorld).
        columns:
          - name: subsidiary_id
            description: NetSuite internalId (primary key).
            data_tests: [unique, not_null]
      - name: departments
        description: Finance department dimension (distinct from Workday HR depts).
        columns:
          - name: department_id
            description: NetSuite internalId (primary key).
            data_tests: [unique, not_null]
      - name: gl_accounts
        description: Chart of accounts.
        columns:
          - name: account_id
            description: NetSuite internalId (primary key).
            data_tests: [unique, not_null]
          - name: acctnumber
            description: Account number ("1000", "4000").
      - name: gl_transactions
        description: Posted GL transaction lines (balanced double-entry per transaction).
        loaded_at_field: trandate::timestamptz
        columns:
          - name: transaction_line_id
            description: "<transaction_id>-<line> (primary key)."
            data_tests: [unique, not_null]
          - name: transaction_id
            description: NetSuite transaction internalId (debits=credits per id).
          - name: account_id
            description: Joins to gl_accounts.account_id.
          - name: subsidiary_id
            description: Joins to subsidiaries.subsidiary_id.
          - name: created_epoch_ms
            description: Creation time as epoch milliseconds.
      - name: vendors
        description: AP vendor master.
        columns:
          - name: vendor_id
            description: NetSuite internalId (primary key).
            data_tests: [unique, not_null]
          - name: email
            description: PII. AP contact email (sparse).
          - name: tax_id
            description: PII. VAT/EIN (sparse).
      - name: vendor_bills
        description: AP bills (one row per bill header).
        loaded_at_field: created_at
        columns:
          - name: bill_id
            description: NetSuite internalId (primary key).
            data_tests: [unique, not_null]
          - name: vendor_id
            description: Joins to vendors.vendor_id.
          - name: status
            description: Paid In Full / Open / Pending Approval / Cancelled.
