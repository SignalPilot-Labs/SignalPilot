version: 2

sources:
  - name: raw_onfido
    schema: raw_onfido
    description: >
      Onfido identity-verification (KYC) vendor data. Applicants map 1:1 to NALA
      customers; checks group reports (document, facial similarity, watchlist).
      PII-heavy; document numbers are governed (last4 + sha256 hash only).
    tables:
      - name: applicants
        description: One row per Onfido applicant (1:1 with a NALA customer).
        loaded_at_field: "created_at::timestamptz"
        columns:
          - name: id
            description: Onfido applicant id ("applicant_<uuid>").
          - name: external_id
            description: NALA customer code (CUS_########); the join key, ~10% null.
          - name: nala_customer_uuid
            description: Canonical customer uuid; sparse (newer rows only).
          - name: email
            description: Contact email (PII); dirtied casing/format vs core.
          - name: dob
            description: Date of birth (PII).
      - name: checks
        description: One row per verification check; groups reports.
        columns:
          - name: id
            description: Check id ("chk_<uuid>").
          - name: applicant_id
            description: FK to applicants.id (not enforced).
          - name: result
            description: clear / consider / NULL; legacy PASS/FAIL on pre-2021 rows.
          - name: completed_at_epoch
            description: Completion time as epoch SECONDS (bigint), unlike created_at (ISO string).
      - name: reports
        description: One row per adjudicated report (document/identity variants).
        columns:
          - name: id
            description: Report id ("rep_<uuid>").
          - name: check_id
            description: FK to checks.id.
      - name: documents
        description: Uploaded identity documents; doc number governed (last4 + hash).
        columns:
          - name: id
            description: Document id ("doc_<uuid>").
          - name: document_number_last4
            description: Last 4 of the document number (governed PII).
          - name: document_number_hash
            description: sha256 of the full document number (governed PII).
      - name: facial_similarity_reports
        description: Selfie-vs-document face-match reports.
        columns:
          - name: id
            description: Report id ("rep_<uuid>").
          - name: score
            description: 0..1 face match score (~25% null).
      - name: watchlist_reports
        description: In-flow PEP/sanctions/adverse-media screening reports.
        columns:
          - name: id
            description: Report id ("rep_<uuid>").
          - name: n_matches
            description: Number of watchlist records matched (0 for ~93%).
