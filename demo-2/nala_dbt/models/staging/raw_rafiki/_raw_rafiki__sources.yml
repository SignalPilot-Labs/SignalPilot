version: 2

sources:
  - name: raw_rafiki
    description: >
      Rafiki B2B payments / stablecoin-settlement platform. Merchants accept
      stablecoins (USDC/USDT/PYUSD) and pay out in local currencies across
      NALA's receive markets. Backed by several internal microservices, so
      column naming and timestamp formats drift between tables.
    schema: raw_rafiki
    tables:
      - name: merchants
        description: Onboarded B2B businesses using Rafiki. One row per merchant.
        loaded_at_field: created_at
        columns:
          - name: merchant_id
            description: Primary key, 'mrc_<hex>'.
          - name: status
            description: "active / suspended / churned, plus legacy 'PENDING_KYB'."
          - name: accepts_stablecoins
            description: Legacy CSV string of accepted stablecoins (e.g. 'USDC,USDT').
          - name: updated
            description: Legacy updated timestamp as ISO string with no timezone.

      - name: merchant_users
        description: People with login access to a merchant account. PII (name/email/phone).
        columns:
          - name: user_id
            description: Primary key, 'usr_<hex>'.
          - name: email
            description: PII. Dirtied (casing/spacing drift) across systems.
          - name: phone
            description: PII. Dirtied E.164 phone.
          - name: canonical_cid
            description: >
              When set, links this user to the canonical app customer
              (customer_master cid) — cross-source identity join key.
          - name: last_login_at
            description: Epoch milliseconds (auth service).
          - name: created
            description: ISO-Z string.

      - name: merchant_api_keys
        description: API credentials. Stores key prefix + sha256-style hash, never the raw key.
        columns:
          - name: api_key_id
            description: Primary key, 'ak_<hex>'.
          - name: key_prefix
            description: User-visible prefix (e.g. 'rk_live_a1b2'). PII-ish.
          - name: key_hash
            description: Hash of the full key. PII-ish.
          - name: mode
            description: live / test.

      - name: merchant_kyb
        description: Know-Your-Business verification per merchant. PII (UBO name/dob, reg/tax ids).
        columns:
          - name: kyb_status
            description: approved / pending / rejected / review.
          - name: verified_at
            description: ISO-Z string, null until approved.

      - name: rate_cards
        description: Pricing per merchant with effective-date ranges (is_current flags the live one).

      - name: collections
        description: Inbound stablecoin received from merchants' payers. Fact table.
        loaded_at_field: received_at
        columns:
          - name: collection_id
            description: Primary key, 'col_<hex>'.
          - name: from_wallet
            description: PII. Payer crypto wallet address.
          - name: status
            description: "confirmed / pending / failed, plus legacy 'CONFIRMED_OLD'."
          - name: received_at
            description: ISO-Z string.
          - name: confirmed_at
            description: Epoch milliseconds (chain-listener service), nullable.

      - name: payouts
        description: Outbound B2B payouts in local currency. Fact table. PII (recipient name/account).
        columns:
          - name: payout_id
            description: Primary key, 'pyt_<hex>'.
          - name: recipient_account
            description: PII. MSISDN / bank account / IBAN.
          - name: status
            description: "paid / processing / failed / reversed, plus legacy 'PENDING_OLD'."
          - name: canonical_cid
            description: When set, payout recipient is a canonical app customer (cross-source key).
          - name: created
            description: Epoch milliseconds (payout service).
          - name: completed_at
            description: ISO string with no timezone, null until paid.

      - name: settlements
        description: Daily netting of collections vs payouts per merchant. One row per merchant/day.
        loaded_at_field: created_at
        columns:
          - name: settlement_id
            description: Primary key, 'set_<hex>'.
          - name: status
            description: settled / pending / on_hold.

      - name: settlement_lines
        description: Individual collection/payout/fee/adjustment lines rolling up into a settlement.

      - name: invoices
        description: Monthly Rafiki platform-fee invoices to merchants.
        loaded_at_field: issued_at
        columns:
          - name: invoice_id
            description: Primary key, 'inv_<hex>'.
          - name: status
            description: draft / open / paid / void / past_due.

      - name: invoice_line_items
        description: Detail rows on an invoice (collection_fees / payout_fees / fx_margin / platform_fee).

      - name: balances
        description: Current per-merchant per-currency balance snapshot.

      - name: balance_transactions
        description: Ledger of movements affecting a merchant balance. Signed amounts. Fact table.
        columns:
          - name: balance_txn_id
            description: Primary key, 'btxn_<hex>'.
          - name: amount
            description: Signed amount (+ credit, - debit).
          - name: created_at
            description: Epoch milliseconds (ledger service).

      - name: fx_locks
        description: Locked FX quotes used to price payouts.

      - name: webhooks
        description: Merchant-configured webhook endpoints. secret_hash is PII-ish.

      - name: webhook_deliveries
        description: Individual webhook delivery attempts. Fact table.
        columns:
          - name: delivered_at
            description: Epoch milliseconds.
          - name: next_retry_at
            description: Epoch milliseconds, null on success.
