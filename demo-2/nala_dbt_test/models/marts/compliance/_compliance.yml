version: 2

models:
  - name: fct_kyc_checks
    description: >
      KYC check fact. One row per Onfido check, enriched with applicant identity
      and a coarse pass/fail outcome.
    columns:
      - name: onfido_check_id
        description: Onfido check id. Primary key.
        tests:
          - unique
          - not_null
      - name: onfido_applicant_id
        description: Onfido applicant the check belongs to.
        tests:
          - not_null
      - name: customer_code
        description: NALA customer code resolved from the applicant external id (sparse).
      - name: result
        description: Standardized check result (clear / consider).
      - name: outcome
        description: Coarse outcome derived from result (pass / fail / unknown).
      - name: created_at
        description: When the check was created.

  - name: dim_customer_risk
    description: >
      Customer risk dimension. One row per customer, carrying the latest risk band.
      Latest is derived via a window on scored_at because the source is_current SCD
      flag is unreliable.
    columns:
      - name: customer_code
        description: NALA customer code. Primary key (one row per customer).
        tests:
          - unique
          - not_null
      - name: risk_score
        description: Numeric risk score for the latest assessment.
      - name: risk_band
        description: Latest risk band (e.g. low / medium / high).
      - name: pep_flag
        description: Politically exposed person flag.

  - name: fct_sars
    description: >
      Suspicious Activity Report fact. One row per SAR, enriched with the linked
      transfer and customer where the (sparse) keys resolve.
    columns:
      - name: sar_id
        description: SAR id. Primary key.
        tests:
          - unique
          - not_null
      - name: sar_ref
        description: Human-facing SAR reference.
      - name: customer_code
        description: NALA customer code the SAR concerns (sparse).
      - name: transfer_id
        description: Linked core transfer id (sparse).
      - name: status
        description: Standardized SAR status (legacy submitted folded to filed).
      - name: amount_usd
        description: Reported suspicious amount in USD.
