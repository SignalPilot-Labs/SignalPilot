version: 2

models:
  - name: dim_customers
    description: >
      Identity-resolved customer dimension. One row per canonical customer
      (core_transfers.customers), stitched with Onfido KYC and Segment analytics
      identities via customer_code, with lifetime transfer activity rolled in and
      PII presence flags for governance.
    columns:
      - name: customer_id
        description: Canonical customer id (primary key).
        data_tests: [unique, not_null]
      - name: customer_code
        description: Stable business code CUS_xxxxxxxx; cross-system join key.
        data_tests: [not_null]
      - name: email
        description: Canonical lowercased/trimmed email (PII). Core wins, else Onfido/Segment.
      - name: phone
        description: Canonical phone (PII).
      - name: has_email
        description: True when an email is present.
      - name: systems_matched
        description: Count of source systems (core/onfido/segment) matched for this customer.
        data_tests: [not_null]
      - name: transfer_count
        description: Lifetime transfer count.
        data_tests: [not_null]
      - name: total_revenue
        description: Lifetime modelled revenue (fees + fx margin) across the customer's transfers.

  - name: dim_recipients
    description: Beneficiary dimension, one row per recipient, with PII presence flags.
    columns:
      - name: recipient_id
        description: Recipient primary key.
        data_tests: [unique, not_null]
      - name: customer_id
        description: Owning sender customer id.
        data_tests: [not_null]
      - name: receive_country
        description: Recipient receive country.
      - name: has_phone
        description: True when a phone is present (PII).

  - name: dim_corridors
    description: >
      Send->receive corridor lookup keyed by corridor_id, with corridor_pricing
      (fee + fx margin bps) aggregated to the corridor level.
    columns:
      - name: corridor_id
        description: Corridor primary key (maps 1:1 to send/receive country+currency).
        data_tests: [unique, not_null]
      - name: currency_pair
        description: send_currency->receive_currency label.
        data_tests: [not_null]
      - name: avg_fx_margin_bps
        description: Average fx margin (basis points) across this corridor's pricing rows.
      - name: has_pricing
        description: True when a matching corridor_pricing row was found.

  - name: fct_transfers
    description: >
      Central transfer fact, one row per transfer, combining cleaned transfer
      attributes, revenue (fee + fx margin), the funding leg (stripe/plaid/marqeta)
      and the payout leg (internal attempt + mpesa/flutterwave enrichment), with
      foreign keys to dim_customers, dim_recipients and dim_corridors.
    columns:
      - name: transfer_id
        description: Transfer uuid (primary key).
        data_tests: [unique, not_null]
      - name: customer_id
        description: FK to dim_customers.
        data_tests: [not_null]
      - name: recipient_id
        description: FK to dim_recipients.
      - name: corridor_id
        description: FK to dim_corridors.
      - name: send_amount
        description: Amount sent in send_currency.
        data_tests: [not_null]
      - name: status_clean
        description: Coarse cleaned status (completed/pending/failed/cancelled/refunded).
        data_tests:
          - accepted_values:
              values: ['completed', 'pending', 'failed', 'cancelled', 'refunded']
      - name: total_revenue
        description: Modelled total revenue (fee revenue + fx margin) for the transfer.
        data_tests: [not_null]
      - name: funding_source
        description: Which rail funded the transfer (stripe/plaid/marqeta), null if unmatched.
      - name: payout_status
        description: Status of the chosen payout attempt.
