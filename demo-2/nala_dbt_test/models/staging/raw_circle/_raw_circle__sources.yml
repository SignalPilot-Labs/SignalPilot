version: 2

sources:
  - name: raw_circle
    schema: raw_circle
    description: >
      Circle USDC wallets, transfers, fiat payments, and chargebacks. ISO-Z
      string timestamps; transfer amounts as decimal strings; governed card PII
      (last4 + BIN only). Loaded by warehouse/generators/gen_raw_circle.py.
    tables:
      - name: usdc_wallets
        description: Circle wallets — one merchant wallet plus end-user wallets.
        columns:
          - name: wallet_id
            description: Primary key, Circle walletId.
          - name: customer_ref
            description: CUS_... (dirty PII join key, ~12% null).
          - name: address
            description: On-chain address (PII), null for hosted wallets.
          - name: create_date
            description: ISO-Z string (text).

      - name: usdc_transfers
        description: USDC wallet-to-wallet and on-chain transfers.
        columns:
          - name: id
            description: Primary key, Circle transfer uuid.
          - name: source_wallet_id
            description: FK to usdc_wallets (null when source is blockchain).
          - name: amount
            description: Decimal STRING — cast to numeric.
          - name: tx_hash
            description: On-chain hash (PII-ish), null until complete.
          - name: create_date
            description: ISO-Z string (text).

      - name: usdc_payments
        description: Inbound fiat funding payments (card/ACH/wire) and refunds.
        columns:
          - name: id
            description: Primary key, Circle payment uuid.
          - name: merchant_wallet_id
            description: FK to usdc_wallets.
          - name: customer_ref
            description: CUS_... (dirty PII join key).
          - name: card_last4
            description: Last 4 of PAN (governed PII).
          - name: card_bin
            description: First 6 / BIN (governed PII).
          - name: create_date
            description: ISO-Z string (text).

      - name: chargebacks
        description: Card disputes raised against a Circle payment.
        columns:
          - name: id
            description: Primary key, Circle chargeback uuid.
          - name: payment_id
            description: FK to usdc_payments.
          - name: create_date
            description: ISO-Z string (text).
