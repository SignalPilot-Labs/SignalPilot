version: 2

sources:
  - name: raw_compliance
    schema: raw_compliance
    description: >
      NALA internal compliance operations (MLRO source of record): SARs filed to
      regulators, the case-management investigation queue, periodic customer risk
      scores, and the consolidated sanctions list. Internal system, so timestamps
      are clean timestamptz. PII-heavy; national ids governed (id + sha256 hash).
    tables:
      - name: sars
        description: One row per Suspicious Activity Report (filed or drafted).
        loaded_at_field: created_at
        columns:
          - name: sar_id
            description: PK.
          - name: customer_code
            description: NALA customer code (join key).
          - name: subject_national_id
            description: Subject national id (governed PII).
          - name: subject_national_id_hash
            description: sha256 of national id (governed PII).
          - name: transfer_id
            description: Triggering transfer uuid (-> raw_core_transfers; ~40% null).
          - name: status
            description: draft / filed / acknowledged / closed_no_action (legacy SUBMITTED).
      - name: case_management
        description: Compliance investigation cases.
        loaded_at_field: created_at
        columns:
          - name: case_id
            description: PK.
          - name: source
            description: onfido / complyadvantage / chainalysis / rules_engine / manual.
          - name: source_ref
            description: Id in the originating source system (cross-system, not FK).
          - name: status
            description: open / in_progress / pending_info / escalated / closed (legacy NEW).
      - name: risk_scores
        description: Customer risk score snapshots (periodic + event-driven).
        loaded_at_field: created_at
        columns:
          - name: id
            description: PK.
          - name: customer_code
            description: NALA customer code (join key).
          - name: risk_band
            description: low / medium / high / prohibited.
          - name: is_current
            description: Latest-score flag; messy (~4% have >1 current per customer).
      - name: sanctions_list
        description: Consolidated sanctions list lookup (OFAC/UN/HMT/EU).
        columns:
          - name: entry_id
            description: PK.
          - name: entity_name
            description: Sanctioned entity name.
          - name: list_name
            description: Source list.
