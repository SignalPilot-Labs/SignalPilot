version: 2

sources:
  - name: raw_complyadvantage
    schema: raw_complyadvantage
    description: >
      ComplyAdvantage AML / sanctions / PEP screening. A search screens a customer
      against watchlists and returns hits; monitors keep searches under ongoing
      surveillance and raise alerts on change.
    tables:
      - name: searches
        description: One row per screening search (~one per screened customer).
        loaded_at_field: "created_at::timestamptz"
        columns:
          - name: id
            description: ComplyAdvantage numeric search id.
          - name: ref
            description: Client reference = NALA customer code (join key, ~6% null).
          - name: search_term
            description: Name string searched (PII).
          - name: match_status
            description: no_match / potential_match / false_positive / true_positive / unknown.
          - name: risk_level
            description: low / medium / high / unknown.
      - name: search_hits
        description: One row per matched watchlist entity within a search.
        columns:
          - name: id
            description: Surrogate PK (vendor nests hits under the search).
          - name: search_id
            description: FK to searches.id.
          - name: entity_name
            description: Matched watchlist entity name (PII).
          - name: match_score
            description: 0..100 vendor match score (~15% null).
      - name: monitors
        description: Ongoing monitor registrations on a search.
        columns:
          - name: id
            description: Monitor id.
          - name: monitor_frequency
            description: daily/weekly/monthly; legacy UPPERCASE on old rows.
      - name: monitor_alerts
        description: Alerts raised by monitors on match-state change.
        columns:
          - name: id
            description: Alert id.
          - name: status
            description: open / acknowledged / closed / escalated (legacy OPEN).
          - name: resolved_at_epoch_ms
            description: Resolution time as epoch MILLISECONDS (created_at is ISO string).
