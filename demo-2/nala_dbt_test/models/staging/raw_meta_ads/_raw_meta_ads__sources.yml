version: 2

sources:
  - name: raw_meta_ads
    description: >
      Meta (Facebook/Instagram) Marketing API export (paid-social acquisition).
      Aggregate spend only — no customer PII. Budgets are DECIMAL strings in
      minor units; ad_insights spend is account-currency major units.
    schema: raw_meta_ads
    tables:
      - name: campaigns
        description: Meta campaigns. status vs effective_status can disagree.
        columns:
          - name: id
            description: Numeric string id (primary key).
          - name: daily_budget
            description: DECIMAL string in minor units (cents).
          - name: created_time
            description: ISO string with tz offset.
      - name: ad_sets
        description: Ad sets (targeting + budget) within a campaign.
        columns:
          - name: id
            description: Numeric string id (primary key).
          - name: campaign_id
            description: FK to campaigns.id.
      - name: ad_insights_daily
        description: >
          Daily aggregate performance per ad set per platform. Primary
          spend/CAC table. Conversions live inside the actions JSON array.
        loaded_at_field: loaded_at
        columns:
          - name: id
            description: Surrogate primary key.
          - name: date_start
            description: Report date.
          - name: adset_id
            description: FK to ad_sets.id (Meta spelling 'adset').
          - name: spend
            description: Spend in account currency, major units.
          - name: actions
            description: JSON array of {action_type, value}; conversions live here (can be null).
          - name: account_currency
            description: Account currency (GBP/USD/EUR).
