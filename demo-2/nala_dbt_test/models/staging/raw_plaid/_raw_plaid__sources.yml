version: 2

sources:
  - name: raw_plaid
    schema: raw_plaid
    description: >
      Plaid API landing tables. Links a NALA user's external bank account for
      ACH funding and identity verification. ISO-8601 STRING timestamps,
      amounts in MAJOR units. PII: account/routing numbers, names, addresses.
    tables:
      - name: items
        description: One row per linked institution connection for a NALA user.
        columns:
          - name: item_id
            description: Opaque Plaid item id.
          - name: nala_customer_code
            description: Cross-source key to canonical NALA customer (CUS_00000123).
          - name: status
            description: Item status; includes legacy ITEM_LOGIN_REQUIRED.
      - name: accounts
        description: Bank accounts under a Plaid item (balances in MAJOR units).
        columns:
          - name: account_id
            description: Opaque Plaid account id.
          - name: item_id
            description: Parent item id.
          - name: mask
            description: Account last 4 (PII).
      - name: auth_numbers
        description: Account + routing numbers for ACH debit. Heavy PII.
        columns:
          - name: account_id
            description: Parent account id.
          - name: account
            description: Full bank account number (PII).
          - name: routing
            description: Routing / sort code (PII).
      - name: transactions
        description: >
          Bank transaction feed. Plaid sign convention: positive amount = money
          OUT of the account. NALA-originated debits carry nala_transfer_id.
        loaded_at_field: created_at::timestamptz
        columns:
          - name: transaction_id
            description: Opaque transaction id.
          - name: amount
            description: MAJOR units; positive = money out.
          - name: nala_transfer_id
            description: UUID of funded transfer (dirty casing, sparse).
      - name: identity_data
        description: Name/email/phone/address on a linked account. Heavy PII.
        columns:
          - name: account_id
            description: Parent account id.
          - name: full_name
            description: Account holder name (PII).
