version: 2

sources:
  - name: raw_segment
    schema: raw_segment
    description: >
      Segment Connections event pipeline (analytics.js + mobile SDKs ->
      warehouse destination). Carries both anonymous_id and user_id; user_id
      is the canonical customer code (CUS_...) and is NULL for anonymous traffic.
    loaded_at_field: received_at
    tables:
      - name: tracks
        description: "FACT event stream. One row per `track` call (a user action). jsonb `properties` payload + flattened context_* columns + Segment multi-timestamp set."
        columns:
          - name: id
            description: "Segment message id (uuid-like). Primary key."
          - name: event
            description: "Event name, e.g. 'Transfer Started', 'KYC Submitted', 'Recipient Added'."
          - name: anonymous_id
            description: "Device/browser anonymous id. Stable per customer; equals raw_amplitude.events.device_id."
          - name: user_id
            description: "Customer code CUS_... — NULL for anonymous (pre-identify) traffic. PII link."
          - name: properties
            description: "Event-specific jsonb payload (send_amount, corridor, receive_country, fee, ...)."
          - name: context_ip
            description: "Client IP (inet). PII."
          - name: timestamp
            description: "Canonical event time (timestamptz)."
          - name: received_at
            description: "When Segment received the event (load watermark)."
      - name: identifies
        description: "One row per `identify` call — binds anonymous_id to user_id with user traits (PII in traits/email/phone)."
        columns:
          - name: user_id
            description: "Customer code CUS_... (always present on identify)."
          - name: email
            description: "Denormalized email trait. PII; dirty casing/format."
          - name: traits
            description: "jsonb user traits blob (name, country, currency, ...). Contains PII."
      - name: pages
        description: "Web `page` calls (marketing site + web app). user_id usually NULL."
      - name: screens
        description: "Mobile `screen` calls (iOS/Android in-app navigation)."
      - name: groups
        description: "`group` calls associating a user with a merchant/org (Rafiki side). Sparse."
