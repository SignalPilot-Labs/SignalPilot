version: 2

sources:
  - name: raw_zendesk
    description: >
      Zendesk Support tickets, users, comments and CSAT. End-user Zendesk users
      map to NALA customers via external_id (customer code) and a dirty email.
    schema: raw_zendesk
    tables:
      - name: users
        description: Zendesk users (agents + end-users). PII (name/email/phone).
        columns:
          - name: id
            description: Zendesk user id (primary key).
          - name: email
            description: PII. Dirty email, ~6% null.
          - name: phone
            description: PII. Dirty E.164, ~50% null.
          - name: external_id
            description: NALA customer code for end-users (join key); null for agents.
          - name: role
            description: end-user / agent / admin.
      - name: tickets
        description: >
          Support tickets (primary support fact). ~40% reference a transfer_id.
          solved_at is an ISO-Z text string.
        loaded_at_field: created_at
        columns:
          - name: id
            description: Ticket id (primary key).
          - name: requester_id
            description: FK to users.id (end-user).
          - name: assignee_id
            description: FK to users.id (agent), nullable.
          - name: status
            description: new / open / pending / hold / solved / closed.
          - name: requester_email
            description: PII. Dirty denormalized email snapshot, ~6% null.
          - name: transfer_id
            description: Core transfers UUID this ticket is about, ~40% populated.
          - name: solved_at
            description: ISO-Z string, null until solved (text, not timestamp).
      - name: ticket_comments
        description: Replies/notes on tickets. body is free text (may hold PII).
        columns:
          - name: id
            description: Comment id (primary key).
          - name: ticket_id
            description: FK to tickets.id.
      - name: satisfaction_ratings
        description: CSAT survey responses (good/bad) on solved tickets.
        loaded_at_field: created_at
        columns:
          - name: id
            description: Rating id (primary key).
          - name: ticket_id
            description: FK to tickets.id.
          - name: score
            description: good / bad / offered / unoffered.
