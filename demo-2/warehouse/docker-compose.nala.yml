# Isolated NALA warehouse Postgres — DO NOT merge into the main stack.
# Distinct container name, volume, network, and host port (5602) so it never
# collides with the main signalpilot stack (which uses 5601/3300/3200/2718).
name: nala-warehouse

services:
  nala-warehouse-pg:
    image: postgres:17
    container_name: nala-warehouse-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: nala
      POSTGRES_PASSWORD: nala_dev_only
      POSTGRES_DB: nala_warehouse
      # Tuned for bulk loads of fake data (demo box, not production).
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "max_wal_size=8GB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "checkpoint_timeout=30min"
    ports:
      - "127.0.0.1:5602:5432"
    volumes:
      - nala_wh_pgdata:/var/lib/postgresql/data
    shm_size: "2gb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nala -d nala_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nala_wh_pgdata:
    name: nala_wh_pgdata
