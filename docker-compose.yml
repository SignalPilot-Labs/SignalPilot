# SignalPilot — Local Development Stack
#
# Usage: docker compose up --build
#
# Starts: Postgres + Gateway + Notebook + Web + Sandbox
# No K8s, no .env file, no external dependencies. Works on any OS.
#
# Services:
#   - db        (Postgres 17)          localhost:5601
#   - gateway   (FastAPI backend)      localhost:3300
#   - notebook  (Notebook kernel)      localhost:2718
#   - web       (Next.js frontend)     localhost:3200
#   - sandbox   (gVisor code exec)     internal only
#
# Open http://localhost:3200 to start.

name: signalpilot

services:
  # ─── Database ──────────────────────────────────────────────────
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: signalpilot
      POSTGRES_PASSWORD: changeme_dev_only
      POSTGRES_DB: signalpilot
    ports:
      - "127.0.0.1:${SP_DB_PORT:-5601}:5432"
    volumes:
      - signalpilot-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalpilot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Gateway (API + proxy) ────────────────────────────────────
  gateway:
    build:
      context: ./signalpilot/gateway
      dockerfile: ../../Dockerfile.gateway
    ports:
      - "${SP_GATEWAY_HOST:-0.0.0.0}:${SP_GATEWAY_PORT:-3300}:3300"
    env_file:
      - path: ./.slack.local.env
        required: false
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://signalpilot:changeme_dev_only@db:5432/signalpilot
      SP_DATA_DIR: /data
      SP_DEPLOYMENT_MODE: local
      SP_ENCRYPTION_KEY: 5d1aa5ETRcln8vkPWrzDkdfSEuqAua5xcZCWMLMDXmc=
      SP_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:${SP_WEB_PORT:-3200},http://localhost:${SP_GATEWAY_PORT:-3300},http://localhost:${SP_NOTEBOOK_PORT:-2718}
      # Notebook: direct mode (no K8s)
      SP_NOTEBOOK_DIRECT_URL: http://notebook:2718
      SP_NOTEBOOK_UPSTREAM_MODE: direct
      SP_NOTEBOOK_IMAGE: signalpilot-notebook:latest
      SP_NOTEBOOK_NETWORK_POLICY: "false"
      SP_PUBLIC_GATEWAY_URL: http://localhost:${SP_GATEWAY_PORT:-3300}
      SP_PUBLIC_GATEWAY_PORT: "${SP_GATEWAY_PORT:-3300}"
      SP_REPOS_DIR: /repos
      SP_WEB_URL: http://localhost:${SP_WEB_PORT:-3200}
      SIGNALPILOT_NOTEBOOK_INTERNAL_URL: http://notebook:2718
      SIGNALPILOT_NOTEBOOK_PUBLIC_URL: http://localhost:${SP_WEB_PORT:-3200}/notebook
      SIGNALPILOT_DELIVERY_MODEL: ${SIGNALPILOT_DELIVERY_MODEL:-claude-sonnet-4-5-20250929}
      # Sandbox
      SP_SANDBOX_MANAGER_URL: http://sandbox:8080
      SP_SANDBOX_ENABLED: "true"
      # Unused in local mode but required by gateway startup
      SP_K8S_HOST: ""
      KUBECONFIG: ""
      SP_K8S_NAMESPACE: default
      SP_GATEWAY_NAMESPACE: signalpilot
      SP_GATEWAY_POD_SELECTOR: "app=signalpilot-gateway"
    volumes:
      - signalpilot-data:/data
      - signalpilot-shared:/shared
      - signalpilot-gateway-secrets:/gateway-secrets
      - signalpilot-repos:/repos
    command: >
      sh -c "python3 -m gateway.dev_local_api_key /shared/local_api_key &&
             uvicorn gateway.main:app --host 0.0.0.0 --port 3300"
    depends_on:
      db:
        condition: service_healthy
      notebook:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3300/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # ─── Notebook Server ──────────────────────────────────────────
  notebook:
    build:
      context: ./signalpilot/notebook-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${SP_NOTEBOOK_PORT:-2718}:2718"
    env_file:
      - path: ./.slack.local.env
        required: false
      - path: ./.env
        required: false
    entrypoint:
      - sh
      - -c
      - |
        export SP_API_KEY=$$(cat /shared/local_api_key 2>/dev/null || echo '')
        exec python -m signalpilot edit \
          --host 0.0.0.0 --port 2718 --headless \
          --no-token --no-skew-protection \
          --allow-origins http://localhost:${SP_WEB_PORT:-3200},http://localhost:${SP_GATEWAY_PORT:-3300} \
          /workspace
    environment:
      SP_LOG_DIR: /tmp/sp-logs
      SP_LOG_LEVEL: "10"
      SP_GATEWAY_URL: http://gateway:3300
      SP_GATEWAY_INTERNAL_URL: http://gateway:3300
      SP_WEB_URL: http://localhost:${SP_WEB_PORT:-3200}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-/home/notebook/.claude}
      SIGNALPILOT_ANALYSIS_AGENT_MODEL: ${SIGNALPILOT_ANALYSIS_AGENT_MODEL:-claude-sonnet-4-5-20250929}
    volumes:
      - signalpilot-workspace:/workspace
      - signalpilot-shared:/shared:ro
      - ${CLAUDE_HOST_CONFIG_DIR:-${HOME:-~}/.config/signalpilot/claude-code-docker}:/home/notebook/.claude
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2718/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ─── Web Frontend ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${SP_WEB_HOST:-0.0.0.0}:${SP_WEB_PORT:-3200}:3200"
    environment:
      SP_GATEWAY_INTERNAL_URL: http://gateway:3300
    volumes:
      - signalpilot-shared:/shared:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3200').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ─── Sandbox (gVisor code execution) ──────────────────────────
  sandbox:
    build:
      context: ./sp-sandbox
      dockerfile: ../Dockerfile.sandbox
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    mem_limit: 512m
    cpus: 2
    pids_limit: 256
    environment:
      SP_GATEWAY_URL: http://gateway:3300
      SP_MAX_VMS: "10"
    volumes:
      # Users root (C:\Users, /home, /Users) — sandboxed DuckDB/SQLite translate
      # host file paths to /host-data/<user>/... (see sandboxed_duckdb.py).
      # Set SP_HOST_DATA_DIR to your OS users-root to enable querying host
      # DuckDB/SQLite files (Windows C:/Users, macOS /Users, Linux /home).
      # When unset it falls back to an empty named volume, so the stack builds
      # and runs with zero config — host-file access is simply disabled.
      - ${SP_HOST_DATA_DIR:-signalpilot-hostdata-empty}:/host-data:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  signalpilot-pg-data:
  signalpilot-data:
  signalpilot-shared:
  signalpilot-gateway-secrets:
  signalpilot-repos:
  signalpilot-workspace:
  # Empty fallback for /host-data when SP_HOST_DATA_DIR is unset (host-file
  # DuckDB/SQLite access disabled).
  signalpilot-hostdata-empty:
