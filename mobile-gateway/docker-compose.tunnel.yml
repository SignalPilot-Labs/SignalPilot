# Cloudflare Tunnel overlay for remote access
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up --build
#
# Prerequisites:
#   1. Run: bash scripts/setup-tunnel.sh
#   2. Or manually create a Cloudflare Tunnel and set the env vars below
#
# Manual setup (if not using setup-tunnel.sh):
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. cloudflared tunnel login
#   3. cloudflared tunnel create signalpilot
#   4. cloudflared tunnel route dns signalpilot your-domain.example.com
#   5. Copy the tunnel credentials JSON to ./tunnel/credentials.json
#   6. Update TUNNEL_ID and TUNNEL_DOMAIN below

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mobile-gateway:
        condition: service_healthy

  mobile-gateway:
    environment:
      TUNNEL_DOMAIN: "${TUNNEL_DOMAIN:-signalpilot.example.com}"
      NODE_ENV: "production"
