# SignalPilot Mobile Access Gateway
# Usage: docker compose up --build
#
# Provides authenticated mobile access to:
#   /app     -> Web UI (port 3200)
#   /monitor -> Self-Improve Monitor (port 3400)
#
# First visit: http://localhost:8080/setup to create admin account
#
# For remote access via Cloudflare Tunnel, also use:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up --build
# Or run: bash scripts/setup-tunnel.sh

services:
  mobile-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sp-mobile-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: "8080"
      WEB_UI_URL: "http://host.docker.internal:3200"
      MONITOR_UI_URL: "http://host.docker.internal:3400"
      GATEWAY_API_URL: "http://host.docker.internal:3300"
      MONITOR_API_URL: "http://host.docker.internal:3401"
      SESSION_MAX_AGE: "86400"
      NODE_ENV: "production"
      # Set a fixed secret for persistent sessions across container restarts:
      # JWT_SECRET: "generate-with-openssl-rand-hex-64"
      # Set when using Cloudflare Tunnel for proper secure cookie handling:
      # TUNNEL_DOMAIN: "signalpilot.example.com"
    volumes:
      - gateway-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gateway-data:
