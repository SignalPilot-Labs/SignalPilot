<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>SignalPilot — Setup</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a1a;
      --surface: #111128;
      --surface-2: #1a1a3e;
      --border: #2a2a5a;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 12px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
    }
    .setup-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo svg {
      width: 48px;
      height: 48px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      margin-bottom: 18px;
    }
    .toggle-row span { font-size: 14px; }
    .toggle {
      width: 44px; height: 24px;
      background: var(--border);
      border-radius: 12px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.active { background: var(--primary); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(20px); }
    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: var(--surface-2);
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0;
    }
    /* TOTP result */
    .totp-result {
      display: none;
      text-align: center;
    }
    .totp-result img {
      max-width: 200px;
      margin: 16px auto;
      border-radius: 12px;
      border: 2px solid var(--border);
    }
    .totp-secret {
      font-family: monospace;
      background: var(--surface-2);
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      word-break: break-all;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="url(#g1)"/>
        <path d="M14 24l6 6 14-14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
      </svg>
    </div>
    <h1>Create Admin Account</h1>
    <p class="subtitle">Set up secure access to SignalPilot</p>

    <div class="error" id="error"></div>

    <form id="setupForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="new-password" required placeholder="Min 12 characters">
        <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
        <p class="hint" id="strengthHint">Use 12+ characters with mixed case, numbers, symbols</p>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" required placeholder="Repeat password">
      </div>

      <div class="toggle-row" id="totpToggle">
        <span>Enable 2FA (TOTP)</span>
        <div class="toggle" id="totpSwitch"></div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Create Account</button>
    </form>

    <div class="totp-result" id="totpResult">
      <h2 style="font-size:18px;margin-bottom:8px;">Scan with Authenticator App</h2>
      <img id="totpQR" alt="TOTP QR Code">
      <p class="hint">Or enter this secret manually:</p>
      <div class="totp-secret" id="totpSecretText"></div>
      <button class="btn" onclick="window.location='/login'" style="margin-top:16px;">Continue to Login</button>
    </div>
  </div>

  <script>
    let totpEnabled = false;
    const toggle = document.getElementById('totpSwitch');
    document.getElementById('totpToggle').addEventListener('click', () => {
      totpEnabled = !totpEnabled;
      toggle.classList.toggle('active', totpEnabled);
    });

    // Password strength
    const pw = document.getElementById('password');
    const bar = document.getElementById('strengthBar');
    const hint = document.getElementById('strengthHint');
    pw.addEventListener('input', () => {
      const v = pw.value;
      let s = 0;
      if (v.length >= 12) s++;
      if (v.length >= 16) s++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      const pct = Math.min(s / 5 * 100, 100);
      bar.style.width = pct + '%';
      bar.style.background = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#22c55e';
      hint.textContent = pct < 40 ? 'Weak — add length, mixed case, numbers, symbols'
                        : pct < 70 ? 'Fair — keep going'
                        : 'Strong password';
    });

    // Submit
    const form = document.getElementById('setupForm');
    const errEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirmPassword').value;

      if (p !== c) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p, enable_totp: totpEnabled }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }
        if (data.totp) {
          form.style.display = 'none';
          document.getElementById('totpResult').style.display = 'block';
          document.getElementById('totpQR').src = data.qr;
          document.getElementById('totpSecretText').textContent = data.secret;
        } else {
          window.location = '/login';
        }
      } catch (err) {
        errEl.textContent = 'Network error';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
