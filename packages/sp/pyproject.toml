[project]
name = "signalpilot-sp"
version = "0.2.0"
description = "SignalPilot SDK — governed data access for notebooks and scripts"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "SignalPilot", email = "eng@signalpilot.ai" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Framework :: Jupyter",
]
readme = "README.md"

[project.urls]
Homepage = "https://signalpilot.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sp"]
