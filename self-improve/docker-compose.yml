services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: improve-monitor
    restart: unless-stopped
    ports:
      - "3400:3400"
      - "3401:3401"
    environment:
      DB_PATH: /data/improve.db
      MASTER_KEY_PATH: /data/master.key
      AGENT_API_URL: http://agent:8500
      SP_API_KEY: ${SP_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3401/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - improve-db:/data
      - /var/run/docker.sock:/var/run/docker.sock

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: improve-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://monitor:3400
    depends_on:
      - monitor

  # Restricted Docker socket proxy — only exposes the API calls needed by run_manager
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: improve-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1      # inspect, start, stop, rm
      POST: 1            # allow POST (run, stop, rm)
      VOLUMES: 1         # volume create/rm
      NETWORKS: 0        # no network management
      SERVICES: 0        # no swarm services
      TASKS: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      PLUGINS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: improve-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      GIT_TERMINAL_PROMPT: "0"
      DB_PATH: /data/improve.db
      SP_BENCHMARK_DIR: /bench
      SP_GATEWAY_URL: http://host.docker.internal:3300
      SP_API_KEY: ${SP_API_KEY:-}
      DOCKER_HOST: tcp://docker-proxy:2375
    depends_on:
      - docker-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8500/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - improve-db:/data
      - ../:/workspace:rw
      - ../research:/home/agentuser/research:ro
      - ${SP_BENCHMARK_DIR:-/tmp/signalpilot-bench}:/bench:rw
      # Persist Claude CLI auth + sessions across restarts
      - claude-agent-sessions:/home/agentuser/.claude
      # Persist cloned repo so resume can pick up where it left off
      - agent-repo:/home/agentuser/repo
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  improve-db:
  claude-agent-sessions:
  agent-repo:
