# SignalPilot — Windows dev stack (sandbox running separately)
# Usage: docker compose -f docker-compose.dev.yml up --build

name: signalpilot

services:
  gateway:
    image: signalpilot/gateway
    build:
      context: ../gateway
      dockerfile: ../docker/Dockerfile.gateway
    ports:
      - "3300:3300"
    environment:
      - SP_DATA_DIR=/data
      - SP_SANDBOX_MANAGER_URL=http://host.docker.internal:8180
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - sp-data:/data
    command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "3300"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: signalpilot/web
    build:
      context: ../web
      dockerfile: ../docker/Dockerfile.web
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_DEPLOYMENT_MODE=cloud
        - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3300
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    ports:
      - "3200:3200"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3300
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - gateway
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5600:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sp-data:
  pg-data:
