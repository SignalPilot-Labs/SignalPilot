# SignalPilot — local development stack
# Usage: docker compose up --build

name: signalpilot

services:
  gateway:
    image: signalpilot/gateway
    build:
      context: ../gateway
      dockerfile: ../docker/Dockerfile.gateway
    ports:
      - "3300:3300"
    environment:
      - SP_DATA_DIR=/data
      - SP_SANDBOX_MANAGER_URL=http://sandbox:8080
    volumes:
      - sp-data:/data
    command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "3300"]
    depends_on:
      sandbox:
        condition: service_started
    restart: unless-stopped

  web:
    image: signalpilot/web
    build:
      context: ../web
      dockerfile: ../docker/Dockerfile.web
    ports:
      - "3200:3200"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3300
    command: ["npm", "start", "--", "--port", "3200"]
    depends_on:
      - gateway
    restart: unless-stopped

  sandbox:
    image: signalpilot/sandbox
    build:
      context: ../../sp-sandbox
      dockerfile: Dockerfile.sandbox
    ports:
      - "8180:8080"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    environment:
      - SP_GATEWAY_URL=http://gateway:3300
      - SP_MAX_VMS=10  # kept for sandbox_manager.py compat (not in repo)
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5600:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  sp-data:
  pg-data:
