<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp</title>
</head>
<body style="
    background-color: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;">
  <form method="POST" action="{base_url}auth/login" data-success-url="{success_url}" style="
    padding: 20px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    width: 300px;
    text-align: center;">
    <input type="hidden" name="next" value="{next}">
    <div style="margin-bottom: 20px;">
      <label for="password" style="
        display: block;
        margin-bottom: 5px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        color: #333;">Access Token / Password</label>
      <input id="password" name="password" type="password" style="
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;">
    </div>
    <button type="submit" style="
        background-color: #1C7362;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;">Login</button>
    <p id="login-error" style="color:red"></p>
  </form>
  <script>
    (function() {{
      var form = document.querySelector('form');
      form.addEventListener('submit', function(event) {{
        event.preventDefault();
        var errorEl = document.getElementById('login-error');
        errorEl.textContent = '';
        fetch(form.action, {{
          method: 'POST',
          body: new URLSearchParams(new FormData(form)),
          headers: {{ 'Accept': 'application/json' }},
          redirect: 'manual'
        }}).then(function(response) {{
          if (response.type === 'opaqueredirect' || response.status === 0) {{
            window.location.assign(form.dataset.successUrl);
          }} else if (response.status === 401) {{
            return response.json().then(function(data) {{
              errorEl.textContent = data.error;
            }});
          }} else if (response.status >= 200 && response.status < 400) {{
            window.location.assign(form.dataset.successUrl);
          }} else {{
            errorEl.textContent = 'Unexpected error (' + response.status + '). Please try again.';
          }}
        }}).catch(function(err) {{
          errorEl.textContent = 'Network error. Please try again.';
        }});
      }});
    }})();
  </script>
</body>
</html>
