# SignalPilot Sandbox Configuration
#
# Three modes, one API. The sandbox backend is invisible to the agent.
# The run_analysis tool behaves identically regardless of mode.

sandbox:
  # "local"     — Shuru microVMs on your machine (macOS, Apple Virtualization.framework)
  # "cloud"     — Hosted sandbox infrastructure (requires sp login)
  # "container" — Hardened Docker containers (works everywhere, weaker isolation)
  mode: local  # default: Shuru microVMs on macOS

  local:
    # Shuru settings (only used when mode: local)
    max_sandboxes: 10
    memory_mb: 512
    cpus: 1
    timeout_sec: 300
    checkpoint: sp-python   # pre-loaded Python checkpoint for fast start

  cloud:
    # SignalPilot Cloud settings (only used when mode: cloud)
    # Run `sp login` to authenticate
    region: auto          # auto-selects closest region
    vm_size: standard     # standard (1 vCPU/512MB) or heavy (4 vCPU/4GB)
    vm_timeout_sec: 300

  container:
    # Docker container settings (only used when mode: container)
    memory_limit: 512m
    cpu_limit: 1
    network: gateway-only   # container can only reach SP gateway
    read_only_rootfs: true  # tmpfs for scratch space
    seccomp_profile: default
